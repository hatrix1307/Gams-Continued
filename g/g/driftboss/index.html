	<div id="offlineLoading" role="status" aria-live="polite">
		<div class="offline-loading-box">
			<div class="offline-loading-title">Drift Boss</div>
			<div class="offline-loading-track"><div id="offlineLoadingBar"></div></div>
			<div id="offlineLoadingText">Preparing game files… 4%</div>
		</div>

	<script>
	window.DRIFT_LOADING_VALUE=4;
	window.DRIFT_LOADING_PROGRESS=function(percent,label){
		var bar=document.getElementById('offlineLoadingBar');
		var text=document.getElementById('offlineLoadingText');
		window.DRIFT_LOADING_VALUE=Math.max(window.DRIFT_LOADING_VALUE,Math.min(100,percent));
		if(bar){bar.classList.remove('indeterminate');bar.style.width=window.DRIFT_LOADING_VALUE+'%'}
		if(text)text.textContent=(label||'Loading game…')+' '+Math.round(window.DRIFT_LOADING_VALUE)+'%';
	};
	window.DRIFT_LOADING_INDETERMINATE=function(label){
		var bar=document.getElementById('offlineLoadingBar');
		var text=document.getElementById('offlineLoadingText');
		if(bar){bar.style.width='';bar.classList.add('indeterminate')}
		if(text)text.textContent=label||'Loading game engine…';
	};
	(function(){
		var originalLog=console.log;
		console.log=function(){
			originalLog.apply(console,arguments);
			var message=Array.prototype.map.call(arguments,String).join(' ');
			if(/sdk is ready/i.test(message))window.DRIFT_LOADING_PROGRESS(48,'Services ready…');
			else if(/Babylon\.js/i.test(message))window.DRIFT_LOADING_PROGRESS(53,'Starting graphics…');
			else if(/init babylon/i.test(message))window.DRIFT_LOADING_PROGRESS(57,'Building game world…');
			else if(/Initiating sound handler/i.test(message))window.DRIFT_LOADING_PROGRESS(60,'Starting audio…');
			else if(/load scene success/i.test(message))window.DRIFT_LOADING_PROGRESS(76,'Game world ready…');
		};
		function watchScript(script){
			if(!script||script.__driftLoadingWatched)return;
			var src=script&&script.src||'';
			if(/main\.min\.js/i.test(src)){
				script.__driftLoadingWatched=true;
				window.DRIFT_LOADING_INDETERMINATE('Loading game engine…');
				script.addEventListener('load',function(){window.DRIFT_LOADING_PROGRESS(44,'Game engine loaded…')},{once:true});
			}else if(/gamedock-sdk/i.test(src)){
				script.__driftLoadingWatched=true;
				window.DRIFT_LOADING_PROGRESS(45,'Loading game services…');
			}
		}
		var nativeInsertBefore=Node.prototype.insertBefore;
		Node.prototype.insertBefore=function(node,reference){
			if(node&&node.tagName==='SCRIPT')watchScript(node);
			return nativeInsertBefore.call(this,node,reference);
		};
		var nativeAppendChild=Node.prototype.appendChild;
		Node.prototype.appendChild=function(node){
			if(node&&node.tagName==='SCRIPT')watchScript(node);
			return nativeAppendChild.call(this,node);
		};
	})();
	</script>
