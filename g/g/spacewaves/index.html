<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>Space Waves</title>
  <link rel="stylesheet" href="TemplateData/style.css">
  <style>
    html, body, #unity-container, #unity-canvas { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #05050b; }
    #unity-canvas { display: block; }
    #loading-cover { position: fixed; inset: 0; display: grid; place-items: center; background: #05050b; z-index: 2; }
    #unity-loading-bar { width: min(420px, 75vw); text-align: center; }
    #unity-logo img { width: min(320px, 70vw); }
    #unity-progress-bar-empty { height: 14px; margin-top: 28px; overflow: hidden; border: 2px solid #fff; border-radius: 8px; }
    #unity-progress-bar-full { width: 0; height: 100%; background: #8f42ff; }
  </style>
</head>
<body>
  <div id="unity-container"><canvas id="unity-canvas" tabindex="-1"></canvas></div>
  <div id="loading-cover">
    <div id="unity-loading-bar">
      <div id="unity-logo"><img src="logo.png" alt="Space Waves"></div>
      <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
    </div>
  </div>
  <script src="offline-assets.js"></script>
  <script src="offline-runtime.js"></script>
  <script>
    var canvas = document.querySelector("#unity-canvas");
    var loadingCover = document.querySelector("#loading-cover");
    var progressBar = document.querySelector("#unity-progress-bar-full");
    var buildUrl = "Build";
    var config = {
      dataUrl: buildUrl + "/568ea6b3af616bd57f419c508c933303.data.unityweb",
      frameworkUrl: buildUrl + "/c699bc4c24abfbdb4c8b3e15b0af7d3f.framework.js.unityweb",
      codeUrl: buildUrl + "/7fb5141de5923189bc1dc5f94eb619f2.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "do.Games",
      productName: "Space Waves",
      productVersion: "1.1.2-ms"
    };
    var loader = document.createElement("script");
    loader.src = buildUrl + "/dae5c7bd2b15915f51ae4e56b8f5367d.loader.js";
    loader.onload = function () {
      createUnityInstance(canvas, config, function (progress) {
        progressBar.style.width = (progress * 100) + "%";
      }).then(function () {
        loadingCover.style.display = "none";
        canvas.focus();
      }).catch(function (error) {
        loadingCover.textContent = error;
        console.error(error);
      });
    };
    document.body.appendChild(loader);
    window.addEventListener("pointerdown", function () { canvas.focus(); });
  </script>
</body>
</html>
